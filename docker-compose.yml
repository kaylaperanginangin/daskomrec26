services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daskomrec26_app
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-https://daskomrec26.example.com}
      - TRUSTED_PROXIES=*
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-daskomrec26}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lms2_network

  nginx:
    image: nginx:stable-alpine
    container_name: daskomrec26_nginx
    restart: unless-stopped
    ports:
      - "8026:8026"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - lms2_network

  db:
    image: mysql:8.0
    container_name: daskomrec26_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-daskomrec26}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-daskom}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3326:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms2_network

networks:
  lms2_network:
    external: false

volumes:
  db_data:
  vendor_data:
  node_modules_data:
