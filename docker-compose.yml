services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daskomrec26_app
    restart: unless-stopped
    ports:
      - "8026:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-daskomrec26}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lms2_network

  db:
    image: mysql:8.0
    container_name: daskomrec26_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-daskomrec26}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-daskom}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3326:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms2_network

networks:
  lms2_network:
    external: false

volumes:
  db_data:
