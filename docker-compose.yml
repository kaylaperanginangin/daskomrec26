services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daskomrec26_app
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 9000); exit($$socket ? 0 : 1);'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 180s
    networks:
      - lms2_network

  nginx:
    image: nginx:stable-alpine
    container_name: daskomrec26_nginx
    restart: unless-stopped
    ports:
      - "8026:8026"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - lms2_network

  db:
    image: mysql:8.0
    container_name: daskomrec26_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-daskomrec26}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-daskom}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3326:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms2_network

networks:
  lms2_network:
    external: true 

volumes:
  db_data:
  vendor_data:
  node_modules_data:
